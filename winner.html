<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunum Modu - Çekiliş</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center font-sans overflow-hidden selection:bg-blue-500 selection:text-white">
  
  <div id="presentation-container" class="text-center flex flex-col items-center z-10 w-full max-w-5xl px-4">
    <div class="mb-16">
      <h1 id="draw-name" class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 tracking-tight drop-shadow-2xl mb-6 max-w-5xl leading-tight">Çekiliş Yükleniyor...</h1>
      <h2 id="draw-session" class="text-3xl md:text-4xl font-bold text-gray-400 uppercase tracking-[0.2em] hidden">Oturum</h2>
    </div>

    <!-- START STATE -->
    <div id="start-state" class="w-full">
       <button id="determine-winner-btn" disabled class="relative group overflow-hidden bg-gray-900 border-4 border-transparent bg-gradient-to-r from-blue-600 to-green-600 bg-origin-border text-white font-extrabold text-4xl md:text-5xl py-8 px-16 rounded-[3rem] shadow-[0_15px_50px_rgba(59,130,246,0.3)] transform transition-all outline-none focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed hover:-translate-y-2 hover:shadow-[0_25px_60px_rgba(59,130,246,0.5)]">
         <div class="absolute inset-0 bg-gradient-to-r from-blue-500 to-green-500 opacity-0 group-hover:opacity-100 transition duration-300"></div>
         <span class="relative z-10 flex items-center justify-center gap-4">
           🎯 ÇEKİLİŞİ BAŞLAT 🎯
         </span>
       </button>
       <p id="participant-info" class="mt-8 text-gray-500 text-xl font-mono animate-pulse">Veritabanından katılımcılar çekiliyor...</p>
    </div>

    <!-- WINNER STATE -->
    <div id="winner-state" class="hidden w-full transition-all duration-1000 transform scale-0">
      <div class="relative inline-block w-full max-w-4xl mx-auto">
         <div class="absolute -inset-4 bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500 rounded-[3rem] blur-2xl opacity-50 animate-pulse"></div>
         <div class="relative bg-gray-800/90 backdrop-blur-xl border-2 border-yellow-500/50 rounded-[4rem] p-16 md:p-24 shadow-2xl">
           <div class="text-yellow-400 font-bold tracking-[0.4em] uppercase mb-8 text-2xl md:text-3xl drop-shadow-md">KAZANAN</div>
           <div id="winner-name" class="text-6xl md:text-8xl font-black text-white drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] break-words leading-tight">
             ?
           </div>
         </div>
      </div>
    </div>
  </div>

  <!-- Footer Branding -->
  <div class="fixed bottom-4 left-4 z-50 flex items-center gap-3 bg-gray-900/60 p-2 rounded-full backdrop-blur-sm border border-gray-700/50 shadow-lg pointer-events-none fade-in">
    <img src="assets/guyap-logo.png" alt="GÜYAP Logo" class="h-8 w-auto object-contain opacity-80 transition-opacity">
    <span class="text-[10px] text-gray-400 font-mono tracking-widest pl-2 pr-2 uppercase drop-shadow-md">Developer: Barış Soylu</span>
  </div>

  <script type="module" src="winner.js"></script>
</body>
</html>
